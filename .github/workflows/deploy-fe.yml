name: Deploy Frontend — LCD OCR

on:
  push:
    branches: [ main ]
    paths:
      - 'ui/**'
      - '.github/workflows/deploy-fe.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bui-quang-minh/lcd-ocr-fe

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.SERVER_IP }}:8000
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u bui-quang-minh --password-stdin
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            docker rm -f lcd_fe 2>/dev/null || true
            docker run -d \
              --name lcd_fe \
              --restart always \
              --network lcd_net \
              -p 3000:3000 \
              ghcr.io/${{ env.IMAGE_NAME }}:latest

            docker image prune -f
            echo "✅ Frontend LCD OCR deployed"
